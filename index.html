<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pan & Canela | Luxury Experience</title>
    
    <!-- Frameworks y Tipografía -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #003D51; /* Azul Petróleo oficial */
            --gold: #C5A059;    /* Dorado Ocre oficial */
            --glass: rgba(255, 255, 255, 0.95);
        }

        body {
            background-color: var(--primary);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            overflow: hidden; /* Controlado por el snap container */
        }

        /* Motor de Desplazamiento Snap (Estilo Bahama Buck's) */
        .snap-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        .snap-section {
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Estética Luxury Tech */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-left: 3px solid var(--gold);
            box-shadow: -10px 0 40px rgba(0,0,0,0.4);
        }

        .gold-btn {
            background: linear-gradient(135deg, var(--gold) 0%, #a38445 100%);
            color: var(--primary);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .gold-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(197, 160, 89, 0.4);
        }

        .hero-image {
            width: 45%;
            height: 75vh;
            object-fit: cover;
            border-radius: 25px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }

        h1, h2, .font-serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body>

<div class="snap-container" id="mainFlow">
    
    <!-- 1. BIENVENIDA -->
    <section class="snap-section bg-[url('https://i.pinimg.com/736x/6c/66/5e/6c665e6d90806e88a68f86c0c4d36614.jpg')] bg-cover bg-center">
        <div class="absolute inset-0 bg-[#003D51]/75"></div>
        <div class="relative text-center z-10 p-6" data-aos="zoom-in">
            <img src="https://i.ibb.co/wZhvbN76/Logo-Estilista-Comercio-Tipogr-fico-Retro-Llamativo-Blanco-Rojo.png" class="mx-auto w-48 mb-8">
            <h1 class="text-white text-7xl italic mb-4">Pan & Canela</h1>
            <p class="text-white/80 text-xl font-light mb-12 tracking-[0.3em] uppercase">Excelencia Artesanal</p>
            <button onclick="scrollToId('pasoTamanos')" class="gold-btn px-14 py-5 rounded-full font-bold uppercase tracking-widest text-sm">Personalizar Pedido</button>
        </div>
    </section>

    <!-- 2. TAMAÑOS -->
    <section class="snap-section bg-zinc-50" id="pasoTamanos">
        <div class="max-w-6xl w-full p-10">
            <h2 class="text-[#003D51] text-5xl mb-12 italic">1. Elige el Tamaño</h2>
            <div id="gridTamanos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Inyectado por JS -->
            </div>
        </div>
    </section>

    <!-- 3. GALERÍA DINÁMICA DE SABORES -->
    <div id="contenedorSabores">
        <!-- Generado según la selección -->
    </div>
</div>

<!-- PANEL LATERAL: CONFIGURADOR (GLASSMORPHISM) -->
<div id="overlayConfig" class="fixed inset-y-0 right-0 w-full md:w-[550px] glass-panel translate-x-full transition-transform duration-500 z-50 p-12 overflow-y-auto">
    <button onclick="cerrarOverlay()" class="text-[#003D51] font-bold mb-10 flex items-center gap-3 hover:text-[#C5A059] transition-colors">
        <span class="text-3xl">✕</span> CERRAR
    </button>
    
    <div class="mb-12">
        <h3 class="text-[#003D51] font-bold uppercase text-xs tracking-[0.3em] mb-8 border-b border-zinc-200 pb-3">Rellenos (Máximo 2 por piso)</h3>
        <div id="listaRellenos" class="space-y-5"></div>
    </div>

    <div class="mb-12">
        <h3 class="text-[#003D51] font-bold uppercase text-xs tracking-[0.3em] mb-8 border-b border-zinc-200 pb-3">Extras (Máximo 3)</h3>
        <div id="listaExtras" class="space-y-5"></div>
    </div>
</div>

<!-- BARRA DE ESTADO Y TOTAL (STICKY) -->
<div class="fixed bottom-0 inset-x-0 bg-white/95 backdrop-blur-xl border-t-2 border-[#C5A059] h-28 flex items-center justify-between px-12 z-40">
    <div class="flex flex-col">
        <span class="text-[#003D51] font-bold uppercase text-[11px] tracking-[0.2em]">Total del Pedido</span>
        <span id="txtTotal" class="text-4xl font-bold text-[#C5A059]">$0.00</span>
    </div>
    <div class="flex flex-col items-end gap-2">
        <button id="btnFlujo" onclick="finalizar()" class="gold-btn px-12 py-5 rounded-full font-bold uppercase text-xs disabled:opacity-40 disabled:grayscale" disabled>
            Faltan Rellenos...
        </button>
        <p class="text-[10px] text-zinc-400 italic">Se requiere abono del 50% para confirmar</p>
    </div>
</div>

<script>
    // --- LÓGICA DE DATOS Y AUTOMATIZACIÓN ---
    const urlAPI = "https://script.google.com/macros/s/AKfycbx2q7pA_gduY4Y7qut86gQd16J0y48ALSj1_bthl3C4YNOz1tSyBNQyEHY9_AKKhI5n/exec";
    let todasLasTablas = {};
    let pedido = {
        base: 0,
        esDoble: false,
        piso1: { sabor: "", precio: 0 },
        piso2: { sabor: "", precio: 0 }
    };

    AOS.init({ duration: 1200, once: true });

    fetch(urlAPI)
        .then(res => res.json())
        .then(data => {
            todasLasTablas = data;
            renderTamanos();
        });

    function renderTamanos() {
        const grid = document.getElementById('gridTamanos');
        for (const cat in todasLasTablas) {
            if (["Rellenos", "Extras", "Imagenes", "Pedidos Recibidos"].includes(cat)) continue;
            todasLasTablas[cat].forEach(f => {
                const porc = f["Porciones"] || f["porcion"];
                const el = document.createElement('div');
                el.className = "bg-white p-10 rounded-3xl shadow-xl border-2 border-transparent cursor-pointer hover:border-[#C5A059] transition-all group";
                el.innerHTML = `
                    <span class="text-[#C5A059] text-[10px] font-bold uppercase tracking-widest">${cat}</span>
                    <h4 class="text-[#003D51] text-3xl font-bold mt-3 italic font-serif">${porc} Porciones</h4>
                `;
                el.onclick = () => selectTamano(cat, porc, f);
                grid.appendChild(el);
            });
        }
    }

    function selectTamano(cat, porc, fila) {
        pedido.esDoble = (cat === "Dos_Pisos");
        pedido.base = pedido.esDoble ? parseFloat(Object.values(fila).find(v => !isNaN(v) && v > 0)) : 0;
        generarGaleria(fila);
        scrollToId('contenedorSabores');
    }

    function generarGaleria(fila) {
        const cont = document.getElementById('contenedorSabores');
        cont.innerHTML = '';
        Object.keys(fila).forEach(s => {
            if (s.toLowerCase().includes('porcion') || s.toLowerCase().includes('imagen')) return;
            const p = fila[s];
            const img = getImg(s);
            const desc = s === "Chocotón del Amor" ? "Nuestra especialidad con Ganache de chocolate premium[cite: 1]." : "Elaboración artesanal con la receta secreta de Pan & Canela.";

            const sec = document.createElement('section');
            sec.className = "snap-section bg-white flex flex-col md:flex-row items-center gap-20 px-24";
            sec.innerHTML = `
                <img src="${img}" class="hero-image" data-aos="fade-right">
                <div class="max-w-xl" data-aos="fade-left">
                    <h2 class="text-7xl text-[#003D51] italic mb-8 font-serif">${s}</h2>
                    <p class="text-zinc-500 text-xl font-light leading-relaxed mb-10">${desc}</p>
                    <div class="flex items-center gap-10">
                        <span class="text-5xl font-bold text-[#C5A059]">$${p}</span>
                        <button onclick="abrirConfig('${s}', ${p})" class="gold-btn px-12 py-5 rounded-full font-bold uppercase text-xs">Seleccionar</button>
                    </div>
                </div>
            `;
            cont.appendChild(sec);
        });
        AOS.refresh();
    }

    function abrirConfig(sabor, precio) {
        pedido.piso1.sabor = sabor;
        pedido.piso1.precio = parseFloat(precio);
        renderOpciones();
        document.getElementById('overlayConfig').classList.remove('translate-x-full');
        calcTotal();
    }

    function renderOpciones() {
        const divR = document.getElementById('listaRellenos');
        divR.innerHTML = '';
        todasLasTablas["Rellenos"].forEach((r, i) => {
            divR.innerHTML += `
                <div class="flex justify-between items-center p-5 bg-zinc-50 rounded-2xl border border-zinc-100">
                    <span class="font-bold text-[#003D51] text-base">${r.Relleno} (+$${r.Precio})</span>
                    <div class="flex items-center gap-5">
                        <button onclick="updQty('r', ${i}, -1)" class="w-10 h-10 rounded-full bg-[#003D51] text-white">-</button>
                        <span id="q-r-${i}" class="font-bold text-xl">0</span>
                        <button onclick="updQty('r', ${i}, 1)" class="w-10 h-10 rounded-full bg-[#003D51] text-white">+</button>
                    </div>
                </div>`;
        });

        const divE = document.getElementById('listaExtras');
        divE.innerHTML = '';
        todasLasTablas["Extras"].forEach((ex, i) => {
            const isLim = ex.Producto.includes("Limón");
            divE.innerHTML += `
                <div class="flex justify-between items-center p-5 bg-zinc-50 rounded-2xl border border-zinc-100">
                    <div>
                        <span class="block font-bold text-[#003D51]">${ex.Producto}</span>
                        <span class="text-xs text-[#C5A059] font-bold">${isLim ? "PREMIUM +$3.00[cite: 1]" : "+$"+ex.Precio}</span>
                    </div>
                    <div class="flex items-center gap-5">
                        <button onclick="updQty('e', ${i}, -1)" class="w-8 h-8 rounded-full bg-zinc-200 text-[#003D51]">-</button>
                        <span id="q-e-${i}" class="font-bold">0</span>
                        <button onclick="updQty('e', ${i}, 1)" class="w-8 h-8 rounded-full bg-zinc-200 text-[#003D51]">+</button>
                    </div>
                </div>`;
        });
    }

    function updQty(tipo, idx, delta) {
        const el = document.getElementById(`q-${tipo}-${idx}`);
        let cur = parseInt(el.textContent);
        if (tipo === 'r') {
            const totR = Array.from(document.querySelectorAll('[id^="q-r-"]')).reduce((a,b) => a + parseInt(b.textContent), 0);
            if (delta > 0 && totR >= (pedido.esDoble ? 4 : 2)) return; // Máx 2 por piso[cite: 1]
        } else {
            const totE = Array.from(document.querySelectorAll('[id^="q-e-"]')).reduce((a,b) => a + parseInt(b.textContent), 0);
            if (delta > 0 && totE >= 3) return; // Máx 3 extras[cite: 1]
        }
        if (cur + delta >= 0) el.textContent = cur + delta;
        calcTotal();
    }

    function calcTotal() {
        let ext = 0;
        document.querySelectorAll('[id^="q-"]').forEach(s => {
            const [t, i] = s.id.replace('q-', '').split('-');
            const c = parseInt(s.textContent);
            if (c > 0) ext += (c * (t === 'r' ? todasLasTablas["Rellenos"][i].Precio : todasLasTablas["Extras"][i].Precio));
        });
        const total = pedido.base + pedido.piso1.precio + ext;
        document.getElementById('txtTotal').textContent = `$${total.toFixed(2)}`;
        
        const btn = document.getElementById('btnFlujo');
        const totR = Array.from(document.querySelectorAll('[id^="q-r-"]')).reduce((a,b) => a + parseInt(b.textContent), 0);
        const min = pedido.esDoble ? 2 : 1;
        
        if (totR >= min) {
            btn.disabled = false; btn.textContent = "Siguiente ⮕";
            btn.classList.add('bg-[#C5A059]');
        } else {
            btn.disabled = true; btn.textContent = "Faltan Rellenos...";
            btn.classList.remove('bg-[#C5A059]');
        }
    }

    function scrollToId(id) { document.getElementById(id).scrollIntoView({ behavior: 'smooth' }); }
    function cerrarOverlay() { document.getElementById('overlayConfig').classList.add('translate-x-full'); }
    function getImg(n) { return todasLasTablas["Imagenes"]?.find(i => i.Producto === n)?.Imagen || "https://i.ibb.co/3sX8F8P/logo-pan-canela.png"; }
    function finalizar() { alert("Pedido validado. Procediendo a datos de entrega y recordatorio del 50% de abono[cite: 1]."); }
</script>

</body>
</html>
